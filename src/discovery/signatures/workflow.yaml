# WORKFLOW Agent Signatures
# AI-powered workflow automation and orchestration platforms

signatures:
  - id: workflow-dify
    name: Dify
    type: WORKFLOW
    description: |
      Dify is an open-source LLM application development platform that
      enables building AI workflows and agents with visual orchestration.
    vendor: https://dify.ai
    version: "1.0.0"
    processes:
      - name: "dify"
        cmdPattern: ".*dify.*"
      - name: "docker"
        cmdPattern: ".*dify.*"
      - name: "python"
        cmdPattern: ".*dify.*|.*flask.*dify.*"
    files:
      - path: "**/dify/**"
        exists: true
      - path: "**/.dify/**"
        exists: true
      - path: "**/dify/docker/**"
        exists: true
      - path: "**/docker-compose.dify.yaml"
        exists: true
    network:
      domains:
        - "api.dify.ai"
        - "*.dify.ai"
        - "cloud.dify.ai"
      ports:
        - 443
        - 5001
        - 3000
      urlPatterns:
        - ".*dify\\.ai/v1/.*"
        - ".*api\\.dify\\.ai/.*"
    riskLevel: medium
    confidence: 85

  - id: workflow-n8n
    name: n8n
    type: WORKFLOW
    description: |
      n8n is a workflow automation platform that supports AI integrations
      and allows building complex automation pipelines with AI nodes.
    vendor: https://n8n.io
    version: "1.0.0"
    processes:
      - name: "n8n"
        cmdPattern: ".*n8n.*"
      - name: "node"
        cmdPattern: ".*n8n.*"
    files:
      - path: "**/.n8n/**"
        exists: true
      - path: "**/n8n/**"
        exists: true
      - path: "**/docker-compose.n8n.yaml"
        exists: true
    network:
      domains:
        - "api.n8n.io"
        - "*.n8n.io"
        - "app.n8n.io"
      ports:
        - 5678
        - 443
      urlPatterns:
        - ".*n8n\\.io/api/.*"
        - ".*internal\\.n8n\\.io/.*"
    riskLevel: medium
    confidence: 90

