    processes:
      - name: "llama"
        cmdPattern: ".*llama.*index.*|.*llamaindex.*"
      - name: "python"
        cmdPattern: ".*llama_index.*|.*llamaindex.*"
        envPatterns:
          OPENAI_API_KEY: ".*"
    files:
      - path: "**/.llama/**"
        exists: true
      - path: "**/llama_index/**"
        exists: true
      - path: "**/.llamaindex*"
        exists: true
    network:
