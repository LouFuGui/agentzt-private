    vendor: https://github.com/langflow-ai/langflow
    version: "1.0.0"
    processes:
      - name: "langflow"
        cmdPattern: ".*langflow.*"
      - name: "python"
        cmdPattern: ".*langflow.*|.*uvicorn.*langflow.*"
    files:
      - path: "**/langflow/**"
        exists: true
      - path: "**/.langflow/**"
        exists: true
      - path: "**/langflow.yaml"
        exists: true
    network:
      domains:
        - "api.langflow.org"
        - "*.langflow.org"
        - "langflow.org"
      ports:
        - 7860
        - 443
      urlPatterns:
        - ".*langflow\\.org/api/.*"
    riskLevel: medium
    confidence: 85

