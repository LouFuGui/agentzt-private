# ASSISTANT Agent Signatures
# AI-powered coding assistants and productivity tools

signatures:
  - id: assistant-claude-code
    name: Claude Code
    type: ASSISTANT
    description: |
      Claude Code is Anthropic's official CLI assistant for coding,
      providing intelligent code suggestions and development assistance.
    vendor: https://www.anthropic.com/claude
    version: "1.0.0"
    processes:
      - name: "claude"
        cmdPattern: ".*claude.*code.*|.*claude-code.*"
      - name: "node"
        cmdPattern: ".*claude.*"
        envPatterns:
          ANTHROPIC_API_KEY: ".*"
          CLAUDE_API_KEY: ".*"
    files:
      - path: "**/.claude/**"
        exists: true
      - path: "**/.claude.json"
        exists: true
      - path: "**/claude_desktop_config.json"
        exists: true
    network:
      domains:
        - "api.anthropic.com"
        - "*.anthropic.com"
      ports:
        - 443
      urlPatterns:
        - ".*api\\.anthropic\\.com/v1/.*"
    riskLevel: medium
    confidence: 90

  - id: assistant-cursor
    name: Cursor
    type: ASSISTANT
    description: |
      Cursor is an AI-powered code editor built on VS Code,
      featuring intelligent code completion and chat assistance.
    vendor: https://cursor.sh
    version: "1.0.0"
    processes:
      - name: "Cursor"
        cmdPattern: ".*[Cc]ursor.*"
      - name: "cursor"
        cmdPattern: ".*cursor.*"
      - name: "Cursor Helper"
        cmdPattern: ".*"
    files:
      - path: "**/.cursor/**"
        exists: true
      - path: "**/AppData/Local/Programs/cursor/**"
        exists: true
      - path: "**/.cursorrc"
        exists: true
      - path: "**/cursor.json"
        exists: true
    network:
      domains:
        - "api.cursor.sh"
        - "*.cursor.sh"
        - "api.openai.com"
        - "api.anthropic.com"
      ports:
        - 443
      urlPatterns:
        - ".*cursor\\.sh/api/.*"
    riskLevel: medium
    confidence: 95

  - id: assistant-github-copilot
    name: GitHub Copilot
    type: ASSISTANT
    description: |
      GitHub Copilot is an AI pair programmer that offers suggestions
      from within editors like VS Code, Neovim, and JetBrains IDEs.
    vendor: https://github.com/features/copilot
    version: "1.0.0"
    processes:
      - name: "copilot"
        cmdPattern: ".*copilot.*"
      - name: "CopilotAgent"
        cmdPattern: ".*"
      - name: "node"
        cmdPattern: ".*copilot.*|.*github-copilot.*"
    files:
      - path: "**/.github/copilot/**"
        exists: true
      - path: "**/.vscode/extensions/github.copilot*/**"
        exists: true
      - path: "**/extensions/github.copilot*/**"
        exists: true
    network:
      domains:
        - "api.github.com"
        - "copilot.github.com"
        - "*.github.com"
      ports:
        - 443
      urlPatterns:
        - ".*github\\.com/copilot/.*"
        - ".*api\\.github\\.com/copilot/.*"
    riskLevel: low
    confidence: 95

