  /quota/limit:
    put:
      tags:
        - Quota
      summary: 设置配额限制
      description: 设置指定应用的配额限制（仅管理员）
      parameters:
        - $ref: '#/components/parameters/AppIdQueryParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checksLimit:
                  type: integer
                  minimum: 0
                  example: 10000
                tokensLimit:
                  type: integer
                  minimum: 0
                  example: 1000000
            example:
              checksLimit: 20000
              tokensLimit: 2000000
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Quota limits updated for application "app-xxx"
                  appId:
                    $ref: '#/components/schemas/AppId'
                  quota:
                    type: object
                    properties:
                      checksLimit:
                        type: integer
                      tokensLimit:
                        type: integer
        '400':
