apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentzt-state
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentzt-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentzt-gateway
  template:
    metadata:
      labels:
        app: agentzt-gateway
    spec:
      containers:
        - name: gateway
          image: agentzt:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "gateway"]
          ports:
            - containerPort: 8700
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: state
              mountPath: /app/.agentzt
          readinessProbe:
            httpGet:
              path: /console
              port: 8700
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: agentzt-config
        - name: state
          persistentVolumeClaim:
            claimName: agentzt-state
---
apiVersion: v1
kind: Service
metadata:
  name: agentzt-gateway
spec:
  selector:
    app: agentzt-gateway
  ports:
    - name: http
      port: 8700
      targetPort: 8700
